name: Welcome Team Member
run-name: "새 팀원 환영 - 실행자: ${{ github.actor }}"
on:
  workflow_dispatch

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: 환영 메세지 시작
        run: echo "=== 환영합니다! ==="

      - name: 안내 메세지 출력
        run: |
          echo "오늘은 당신의 첫 출근일입니다"
          echo "프로젝트: GitHub Actions 학습"
          echo "팀: DevOps"
          echo "Runner OS: Linux"

      - name: 마무리 인사
        run: echo "=== 행운을 빕니다! ==="



